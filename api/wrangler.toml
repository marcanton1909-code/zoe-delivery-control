name = "zoe-delivery-api"
main = "src/index.ts"
compatibility_date = "2026-05-20"

[vars]
ALLOWED_ORIGIN = "http://localhost:5173"
MAIL_FROM = "Zoé Delivery Control <entregas@tudominio.com>"
MAIL_COORDINACION = "coordinacion@tudominio.com"
APP_NAME = "Zoé Delivery Control"

[[d1_databases]]
binding = "DB"
database_name = "zoe-delivery-db"
database_id = "REEMPLAZA_CON_DATABASE_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "zoe-delivery-files"
